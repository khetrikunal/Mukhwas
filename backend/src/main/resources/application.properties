# ===== DATABASE =====
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true


# ===== JWT =====
# Dev-only default (>= 32 bytes for HS256). MUST be overridden via JWT_SECRET
# in production — this default is publicly visible in version control.
jwt.secret=${JWT_SECRET:dev-only-jwt-secret-change-in-production-32plus-chars}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ===== CLOUDINARY =====
# Empty defaults — app starts but image upload fails until real values are set.
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ===== RAZORPAY =====
# Empty defaults — app starts but payment creation fails until real values are set.
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}

# ===== MAIL =====
# Empty defaults — app starts but email sending fails silently until set.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:theroyalmukhwassupport@gmail.com}
spring.mail.password=${MAIL_PASSWORD:ouhy buhy aftp rbrd}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===== APP =====
app.name=1824 Vituraya Ventures Private Limited
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.free-shipping-threshold=499
app.cod-max-amount=2000
app.payment-timeout-minutes=15

# ===== CORS =====
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ===== SERVER =====
server.port=8080
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ===== ACTUATOR =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# ===== SWAGGER (springdoc) =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
